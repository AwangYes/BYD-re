name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk
          echo "y" | sudo sdkmanager --licenses > /dev/null 2>&1 || true
          sudo sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Build debug APK
        run: |
          cd xposed
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BYD-Xposed-Hook-debug
          path: xposed/app/build/outputs/apk/debug/*.apk
